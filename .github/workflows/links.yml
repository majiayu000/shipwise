name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  internal-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          # Offline mode verifies that relative links between docs resolve.
          # External URLs are skipped here to keep CI deterministic; verify
          # platform source links manually per the "source rules first" rule.
          args: "--offline --no-progress './**/*.md'"
          fail: true

  scaffold-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Scaffold a project and assert fields are filled
        run: |
          ./scripts/new_project.sh ci-smoke cli-tool
          test -f projects/ci-smoke/project.yaml
          grep -q 'name: "ci-smoke"' projects/ci-smoke/project.yaml
          grep -q 'archetype: "cli-tool"' projects/ci-smoke/project.yaml
          grep -q 'discoverability:' projects/ci-smoke/project.yaml
          for f in projects/_template/*; do
            test -e "projects/ci-smoke/$(basename "$f")"
          done

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "**/*.md"
