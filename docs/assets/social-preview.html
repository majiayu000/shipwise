<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: radial-gradient(1100px 700px at 78% -10%, #1f3a5f 0%, #0c1422 55%, #070b13 100%);
    color: #f3f6fb;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 84px 88px;
    position: relative;
    overflow: hidden;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(120deg, transparent 30%, #000 100%);
  }
  .kicker {
    font-size: 22px; letter-spacing: .32em; text-transform: uppercase;
    color: #6ea8ff; font-weight: 600; margin-bottom: 26px;
  }
  h1 {
    font-size: 132px; font-weight: 800; letter-spacing: -.03em; line-height: 1;
  }
  h1 .dot { color: #4f9dff; }
  .tag {
    margin-top: 30px; font-size: 34px; font-weight: 500;
    color: #b9c6d9; max-width: 980px; line-height: 1.32;
  }
  .chips { margin-top: 44px; display: flex; gap: 16px; flex-wrap: wrap; }
  .chip {
    font-size: 24px; font-weight: 600; color: #cdd9ec;
    border: 1px solid rgba(120,160,220,.32);
    background: rgba(80,140,230,.10);
    padding: 12px 22px; border-radius: 999px;
  }
  .foot {
    position: absolute; left: 88px; bottom: 56px;
    font-size: 24px; color: #80909f; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="kicker">Open-source launch guide</div>
  <h1>Shipwise<span class="dot">.</span></h1>
  <div class="tag">Agent-facing guide for planning and running open-source launches.</div>
  <div class="chips">
    <span class="chip">Repo design</span>
    <span class="chip">Discoverability / SEO</span>
    <span class="chip">Platform rules</span>
    <span class="chip">Templates &amp; checklists</span>
  </div>
  <div class="foot">github.com/majiayu000/shipwise</div>
</body>
</html>
